<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Signaling</title>
</head>

<body>
<h1>Call Signaling</h1>
<div>
<label>My User ID:</label>
<input id="myId" placeholder="Enter user ID 01 "type="text" />
</div>
<br />
<div>
<label>Target User ID to call:</label>
<input id="targetId" placeholder="Enter user ID 02" type="text" />
</div>
<br />
<div>
<button id="connectBtn">Signaling connection</button>
<button id="startCameraBtn">Activate camera</button>
<button id="callBtn">Start calling</button>
<button id="hangupBtn">Hang up the call</button>
</div>
<br />
<div>
    <h3>Local Video</h3>
    <video src="localvideo" autoplay playsinline muted width="320" height="240"></video>
</div>
<br />
<div>
    <h3>Remote Video</h3>
    <video src="remotevideo" autoplay playsinline muted width="320" height="240"></video>
</div>
<div>
<p>Call Signaling status</p>
<pre id="log"></pre>
<script src="./index.js"></script>
</body>
